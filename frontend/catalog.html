<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections — Tanishq</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/catalog.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="index.html" class="logo">Tanishq<span class="logo-dot">.</span></a>
        <nav class="nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="catalog.html" class="nav-link active">Collections</a>
            <a href="cart.html" class="nav-link">Cart <span class="cart-badge" style="display:none">0</span></a>
            <a href="wishlist.html" class="nav-link">Wishlist <span class="wish-badge" style="display:none">0</span></a>
            <span id="authLinks"></span>
        </nav>
    </div>
</header>

<section class="section">
    <div class="container">
        <h2 class="section-title">Our Collection</h2>

        <div class="catalog-search">
            <input type="text" id="catalogSearch" placeholder="Search jewelry..." class="search-input">
            <button id="filterToggle" class="btn-outline filter-toggle-btn">Filters</button>
        </div>

        <div class="catalog-layout">
            <aside class="catalog-sidebar">
                <h3>Category</h3>
                <div id="categoryPills" class="pills-wrap"></div>

                <h3>Max Price</h3>
                <input type="range" id="priceRange" min="0" max="10000" value="10000" step="100" class="price-range">
                <span id="priceVal" class="price-val">₹10,000</span>

                <h3>Sort By</h3>
                <select id="sortSelect" class="sort-select">
                    <option value="">Default</option>
                    <option value="price-asc">Price: Low → High</option>
                    <option value="price-desc">Price: High → Low</option>
                    <option value="rating">Rating</option>
                    <option value="name">Name</option>
                </select>
            </aside>

            <div class="products-grid" id="productsGrid"></div>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container footer-inner">
        <div class="footer-brand"><span class="logo">Tanishq<span class="logo-dot">.</span></span></div>
        <div class="footer-copy">&copy; 2026 Tanishq — A Titan Company. All rights reserved.</div>
    </div>
</footer>

<button class="chat-fab" id="chatFab" title="Chat with Tanishq">💎</button>
<div class="chat-panel" id="chatPanel">
    <div class="chat-header"><span>Tanishq Jewelry Consultant</span><button id="chatClose">✕</button></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area"><input type="text" id="chatInput" placeholder="Ask about jewelry..."><button id="chatSend">Send</button></div>
</div>

</html>
