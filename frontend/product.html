<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product — Tanishq</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="index.html" class="logo">Tanishq<span class="logo-dot">.</span></a>
        <nav class="nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="catalog.html" class="nav-link">Collections</a>
            <a href="cart.html" class="nav-link">Cart <span class="cart-badge" style="display:none">0</span></a>
            <a href="wishlist.html" class="nav-link">Wishlist <span class="wish-badge" style="display:none">0</span></a>
            <span id="authLinks"></span>
        </nav>
    </div>
</header>

<section class="section">
    <div class="container">
        <div class="breadcrumb">
            <a href="index.html">Home</a> / <a href="catalog.html">Collections</a> / <span id="breadcrumbCat"></span> / <span id="breadcrumbName"></span>
        </div>

        <div class="product-detail">
            <div class="product-gallery">
                <div class="product-img-wrap">
                    <img id="productImage" src="" alt="" class="product-main-img">
                </div>
            </div>
            <div class="product-info">
                <div class="product-category-label" id="productCategory"></div>
                <h1 class="product-title" id="productName"></h1>
                <div class="product-rating" id="productRating"></div>
                <div class="product-pricing">
                    <span class="product-price" id="productPrice"></span>
                    <span class="product-original" id="productOriginal"></span>
                    <span class="product-discount-tag" id="productDiscount"></span>
                </div>
                <p class="product-desc" id="productDesc"></p>
                <div class="product-attrs" id="productAttrs"></div>
                <div id="stockStatus" class="stock-status"></div>
                <div class="product-actions">
                    <button class="btn-primary" id="addCartBtn">Add to Cart</button>
                    <button class="btn-outline" id="addWishBtn">♥ Wishlist</button>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container footer-inner">
        <div class="footer-brand"><span class="logo">Tanishq<span class="logo-dot">.</span></span></div>
        <div class="footer-copy">&copy; 2026 Tanishq — A Titan Company. All rights reserved.</div>
    </div>
</footer>
