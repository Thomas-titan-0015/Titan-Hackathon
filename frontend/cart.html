<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart — Tanishq</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="index.html" class="logo">Tanishq<span class="logo-dot">.</span></a>
        <nav class="nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="catalog.html" class="nav-link">Collections</a>
            <a href="cart.html" class="nav-link active">Cart <span class="cart-badge" style="display:none">0</span></a>
            <a href="wishlist.html" class="nav-link">Wishlist <span class="wish-badge" style="display:none">0</span></a>
            <span id="authLinks"></span>
        </nav>
    </div>
</header>

<section class="section">
    <div class="container">
        <h1 class="page-title">Your Cart</h1>
        <div id="emptyCart" class="empty-state" style="display:none">
            <span class="empty-icon">🛒</span>
            <p>Your cart is empty.</p>
            <a href="catalog.html" class="btn-primary">Explore Collections</a>
        </div>
        <div id="cartContent" style="display:none">
            <div class="cart-grid">
                <div class="cart-items" id="cartItems"></div>
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
                    <div class="summary-row"><span>Shipping</span><span id="shipping">Free</span></div>
                    <div class="summary-row"><span>Tax (8%)</span><span id="tax">₹0</span></div>
                    <div class="summary-row" id="discountRow" style="display:none"><span>Discount</span><span id="discountAmount" class="discount-text">-₹0</span></div>
                    <div class="summary-row total"><span>Total</span><span id="total">₹0</span></div>

                    <!-- Promo Code -->
                    <div class="promo-section">
                        <h4>Promo Code</h4>
                        <div class="promo-input-row">
                            <input type="text" id="promoInput" placeholder="Enter code" class="promo-input" maxlength="20">
                            <button id="applyPromoBtn" class="btn-primary btn-sm">Apply</button>
                        </div>
                        <div id="promoMessage" class="promo-message"></div>
                    </div>

                    <!-- Payment Method -->
                    <div class="payment-section">
                        <h4>Payment Method</h4>
                        <div class="pay-options">
                            <label class="pay-option">
                                <input type="radio" name="payMethod" value="card" checked>
                                <span class="pay-option-label">💳 Credit/Debit Card</span>
                            </label>
                            <label class="pay-option">
                                <input type="radio" name="payMethod" value="upi">
                                <span class="pay-option-label">📱 UPI</span>
                            </label>
                        </div>
                        <div id="cardFields" class="pay-fields">
                            <input type="text" placeholder="Card Number" class="pay-input" maxlength="19">
                            <div class="pay-row">
                                <input type="text" placeholder="MM/YY" class="pay-input" maxlength="5">
                                <input type="text" placeholder="CVV" class="pay-input" maxlength="4">
                            </div>
                            <input type="text" placeholder="Cardholder Name" class="pay-input">
                        </div>
                        <div id="upiFields" class="pay-fields" style="display:none">
                            <input type="text" placeholder="UPI ID (e.g. name@upi)" class="pay-input">
                        </div>
                    </div>

                    <button class="btn-primary full-width" id="checkoutBtn">Place Order</button>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container footer-inner">
        <div class="footer-brand"><span class="logo">Tanishq<span class="logo-dot">.</span></span></div>
        <div class="footer-copy">&copy; 2026 Tanishq — A Titan Company. All rights reserved.</div>
    </div>
</footer>

    <svg viewBox="0 0 32 32"><path d="M16.004 0h-.008C7.174 0 0 7.176 0 16c0 3.5 1.129 6.742 3.047 9.379L1.054 31.27l6.156-1.965A15.9 15.9 0 0 0 16.004 32C24.826 32 32 24.822 32 16S24.826 0 16.004 0zm9.31 22.598c-.39 1.1-1.932 2.013-3.18 2.28-.854.18-1.968.324-5.72-1.23-4.8-1.988-7.89-6.856-8.13-7.174-.228-.318-1.924-2.562-1.924-4.888 0-2.326 1.218-3.468 1.65-3.94.39-.428 1.038-.624 1.656-.624.198 0 .378.012.54.018.474.018.714.048 1.026.798.39.936 1.338 3.264 1.458 3.504.12.24.198.516.036.834-.15.318-.228.516-.456.792-.228.276-.48.618-.684.828-.228.234-.468.486-.198.954.27.468 1.2 1.98 2.58 3.21 1.77 1.578 3.264 2.07 3.726 2.298.468.228.738.192 1.008-.12.282-.318 1.2-1.398 1.518-1.878.318-.48.636-.396 1.074-.234.438.15 2.76 1.302 3.234 1.536.468.24.786.354.906.552.114.198.114 1.146-.276 2.244z"/></svg>

<button class="chat-fab" id="chatFab" title="Chat with Tanishq">💎</button>
<div class="chat-panel" id="chatPanel">
    <div class="chat-header"><span>Tanishq Jewelry Consultant</span><button id="chatClose">✕</button></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area"><input type="text" id="chatInput" placeholder="Ask about jewelry..."><button id="chatSend">Send</button></div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/chatUI.js"></script>
<script src="js/cart.js"></script>
<script src="js/popup.js"></script>
</body>
</html>
