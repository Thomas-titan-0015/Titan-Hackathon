<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — Tanishq</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="index.html" class="logo">Tanishq<span class="logo-dot">.</span></a>
        <nav class="nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="catalog.html" class="nav-link">Collections</a>
            <a href="cart.html" class="nav-link">Cart <span class="cart-badge" style="display:none">0</span></a>
            <a href="wishlist.html" class="nav-link">Wishlist <span class="wish-badge" style="display:none">0</span></a>
            <span id="authLinks"></span>
        </nav>
    </div>
</header>

<section class="section">
    <div class="container" style="max-width:600px;">
        <h1 class="page-title">My Profile</h1>

        <div id="profileContent" style="display:none;">
            <!-- Profile completion ring large -->
            <div style="text-align:center;margin-bottom:32px;">
                <div style="display:inline-block;position:relative;width:80px;height:80px;">
                    <svg viewBox="0 0 80 80" style="width:80px;height:80px;">
                        <circle cx="40" cy="40" r="36" fill="none" stroke="var(--border)" stroke-width="4"/>
                        <circle cx="40" cy="40" r="36" fill="none" stroke="var(--accent)" stroke-width="4"
                            stroke-dasharray="226.2" stroke-dashoffset="226.2" stroke-linecap="round"
                            id="profileLargeRing" transform="rotate(-90 40 40)"/>
                    </svg>
                    <span id="profileLargeInitial" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-size:1.8rem;font-weight:700;color:var(--accent);"></span>
                </div>
                <div id="profilePctLabel" style="color:var(--text-secondary);font-size:.85rem;margin-top:8px;"></div>
            </div>

            <!-- Profile form -->
            <form id="profileForm" style="display:flex;flex-direction:column;gap:18px;">
                <div class="form-group">
                    <label style="display:block;font-size:.82rem;color:var(--text-secondary);margin-bottom:4px;">Full Name</label>
                    <input type="text" id="profName" class="profile-date-input" readonly>
                </div>
                <div class="form-group">
                    <label style="display:block;font-size:.82rem;color:var(--text-secondary);margin-bottom:4px;">Email</label>
                    <input type="email" id="profEmail" class="profile-date-input" readonly>
                </div>
                <div class="form-group">
                    <label style="display:block;font-size:.82rem;color:var(--text-secondary);margin-bottom:4px;">Date of Birth</label>
                    <input type="date" id="profDob" class="profile-date-input">
                </div>
                <div class="form-group">
                    <label style="display:block;font-size:.82rem;color:var(--text-secondary);margin-bottom:4px;">Anniversary Date</label>
                    <input type="date" id="profAnniv" class="profile-date-input">
                </div>
                <div class="form-group">
                    <label style="display:block;font-size:.82rem;color:var(--text-secondary);margin-bottom:4px;">Phone Number</label>
                    <input type="tel" id="profPhone" class="profile-date-input" placeholder="+91 XXXXX XXXXX">
                </div>
                <button type="submit" class="btn-primary full-width" id="profileSaveBtn">Save Changes</button>
                <p id="profileMsg" style="text-align:center;font-size:.85rem;display:none;"></p>
            </form>

            <!-- Order history -->
            <div style="margin-top:40px;">
                <h2 style="font-family:var(--font-heading);font-size:1.2rem;margin-bottom:16px;">Order History</h2>
                <div id="orderHistory"><p style="color:var(--text-secondary);">Loading orders…</p></div>
            </div>
        </div>

        <div id="profileLoginPrompt" style="text-align:center;padding:60px 0;">
            <p style="color:var(--text-secondary);margin-bottom:16px;">Please sign in to view your profile.</p>
            <a href="login.html" class="btn-primary">Sign In</a>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container footer-inner">
        <div class="footer-brand"><span class="logo">Tanishq<span class="logo-dot">.</span></span></div>
        <div class="footer-copy">&copy; 2026 Tanishq — A Titan Company. All rights reserved.</div>
    </div>
</footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
(async function() {
    updateNav();
    if (!AUTH.isLoggedIn()) {
        document.getElementById('profileLoginPrompt').style.display = 'block';
        return;
    }
    document.getElementById('profileLoginPrompt').style.display = 'none';
    document.getElementById('profileContent').style.display = 'block';

    const user = AUTH.getUser();
    document.getElementById('profName').value = user.name || '';
    document.getElementById('profEmail').value = user.email || '';
    document.getElementById('profDob').value = user.date_of_birth || '';
    document.getElementById('profAnniv').value = user.anniversary_date || '';
    document.getElementById('profPhone').value = user.phone || '';
    document.getElementById('profileLargeInitial').textContent = user.name ? user.name.charAt(0).toUpperCase() : 'U';

    // Load profile completion
    try {
        const data = await API.getProfileCompletion();
        const pct = data.percentage || 0;
        const circumference = 2 * Math.PI * 36; // 226.2
        const offset = circumference - (pct / 100) * circumference;
        document.getElementById('profileLargeRing').style.strokeDashoffset = offset;
        document.getElementById('profilePctLabel').textContent = `${pct}% Complete`;
    } catch(e) {}

    // Save form
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('profileSaveBtn');
        const msg = document.getElementById('profileMsg');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        const payload = {};
        const dob = document.getElementById('profDob').value;
        const anniv = document.getElementById('profAnniv').value;
        const phone = document.getElementById('profPhone').value.trim();
        if (dob) payload.date_of_birth = dob;
        if (anniv) payload.anniversary_date = anniv;
        if (phone) payload.phone = phone;
        try {
            const updated = await API.updateProfile(payload);
            AUTH.save(AUTH.getToken(), updated);
            msg.style.display = 'block';
            msg.style.color = 'var(--success)';
            msg.textContent = 'Profile updated successfully!';
            // Refresh ring
            const data = await API.getProfileCompletion();
            const pct2 = data.percentage || 0;
            const offset2 = (2 * Math.PI * 36) - (pct2 / 100) * (2 * Math.PI * 36);
            document.getElementById('profileLargeRing').style.strokeDashoffset = offset2;
            document.getElementById('profilePctLabel').textContent = `${pct2}% Complete`;
            updateNav();
        } catch(err) {
            msg.style.display = 'block';
            msg.style.color = 'var(--danger)';
            msg.textContent = err.message || 'Failed to save.';
        }
        btn.disabled = false;
        btn.textContent = 'Save Changes';
        setTimeout(() => { msg.style.display = 'none'; }, 3000);
    });

    // Load orders
    try {
        const orders = await API.getOrders();
        const container = document.getElementById('orderHistory');
        if (orders.length === 0) {
            container.innerHTML = '<p style="color:var(--text-secondary);">No orders yet. <a href="catalog.html">Start shopping</a></p>';
        } else {
            container.innerHTML = orders.map(o => `
                <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                        <strong>Order #${o.id}</strong>
                        <span style="color:var(--text-secondary);font-size:.82rem;">${new Date(o.placed_at).toLocaleString()}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;">
                        <span>${Array.isArray(o.items) ? o.items.length : 0} item(s)</span>
                        <span style="color:var(--accent);font-weight:600;">₹${o.total.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>
                    </div>
                    ${o.promo_code ? `<span style="color:var(--success);font-size:.78rem;">Promo: ${o.promo_code} (-₹${o.discount.toLocaleString('en-IN')})</span>` : ''}
                </div>
            `).join('');
        }
    } catch(e) {
        document.getElementById('orderHistory').innerHTML = '<p style="color:var(--text-secondary);">Could not load orders.</p>';
    }
})();
</script>
</body>
</html>
